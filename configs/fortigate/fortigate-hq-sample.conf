# FortiGate Edge / HQ - Sanitized Conceptual Configuration
# This is not a full export. It mirrors the corrected lab addressing plan.

config system interface
    edit "port1"
        set alias "LAB-INTERNET-NAT"
        set ip 192.168.174.2 255.255.255.0
        set allowaccess ping https ssh
    next
    edit "port2"
        set alias "TO-R1-ANKARA"
        set ip 1.1.1.2 255.255.255.252
        set allowaccess ping
    next
    edit "port3"
        set alias "TO-R2-ISTANBUL"
        set ip 2.1.1.1 255.255.255.252
        set allowaccess ping
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 192.168.174.1
        set device "port1"
    next
    edit 2
        set dst 10.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 3
        set dst 20.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 4
        set dst 30.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 5
        set dst 40.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 6
        set dst 192.168.100.0 255.255.255.0
        set gateway 2.1.1.2
        set device "port3"
    next
end

config firewall address
    edit "ANK_IT_Subnet"
        set subnet 10.1.1.0 255.255.255.0
    next
    edit "ANK_HR_Subnet"
        set subnet 20.1.1.0 255.255.255.0
    next
    edit "ANK_Sales_Subnet"
        set subnet 30.1.1.0 255.255.255.0
    next
    edit "ANK_Engineering_Subnet"
        set subnet 40.1.1.0 255.255.255.0
    next
    edit "IST_Server_Subnet"
        set subnet 192.168.100.0 255.255.255.0
    next
end

config firewall policy
    edit 10
        set name "Internal_to_Internet"
        set srcintf "port2" "port3"
        set dstintf "port1"
        set srcaddr "ANK_IT_Subnet" "ANK_HR_Subnet" "ANK_Sales_Subnet" "ANK_Engineering_Subnet" "IST_Server_Subnet"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set nat enable
    next
    edit 20
        set name "Ankara_to_Server_Services"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "ANK_IT_Subnet" "ANK_HR_Subnet" "ANK_Sales_Subnet" "ANK_Engineering_Subnet"
        set dstaddr "IST_Server_Subnet"
        set action accept
        set schedule "always"
        set service "DNS" "HTTPS" "PING"
        set nat disable
    next
end
