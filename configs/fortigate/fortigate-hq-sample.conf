# FortiGate HQ - Sanitized Conceptual Configuration
# This is not a full export. It is a safe, simplified example.

config system interface
    edit "port1"
        set alias "WAN"
        set ip 203.0.113.2 255.255.255.252
        set allowaccess ping
    next
    edit "port2"
        set alias "LAN-Core"
        set ip 10.10.254.1 255.255.255.252
        set allowaccess ping https ssh
    next
    edit "port3"
        set alias "Branch-WAN"
        set ip 10.255.0.1 255.255.255.252
        set allowaccess ping
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 203.0.113.1
        set device "port1"
    next
end

config firewall address
    edit "HQ_IT_Subnet"
        set subnet 10.10.10.0 255.255.255.0
    next
    edit "HQ_HR_Subnet"
        set subnet 10.10.20.0 255.255.255.0
    next
    edit "HQ_Sales_Subnet"
        set subnet 10.10.30.0 255.255.255.0
    next
    edit "HQ_Server_Subnet"
        set subnet 10.10.40.0 255.255.255.0
    next
end

config firewall policy
    edit 10
        set name "LAN_to_Internet"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "HQ_IT_Subnet" "HQ_HR_Subnet" "HQ_Sales_Subnet"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set nat enable
    next
    edit 20
        set name "Branch_to_AD_DNS"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "HQ_Server_Subnet"
        set action accept
        set schedule "always"
        set service "DNS" "LDAP" "KERBEROS" "SMB"
        set nat disable
    next
end
