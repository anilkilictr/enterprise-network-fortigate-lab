# FortiGate Edge - sample sanitized configuration
# Interface names and syntax may vary by FortiOS version and EVE-NG image.

config system interface
    edit "port1"
        set alias "LAB-INTERNET-NAT"
        set ip 192.168.174.2 255.255.255.0
        set allowaccess ping https ssh
    next
    edit "port2"
        set alias "TO-R1-ANKARA"
        set ip 1.1.1.2 255.255.255.252
        set allowaccess ping
    next
    edit "port3"
        set alias "TO-R2-ISTANBUL"
        set ip 2.1.1.1 255.255.255.252
        set allowaccess ping
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 192.168.174.1
        set device "port1"
    next
    edit 2
        set dst 10.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 3
        set dst 20.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 4
        set dst 30.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 5
        set dst 40.1.1.0 255.255.255.0
        set gateway 1.1.1.1
        set device "port2"
    next
    edit 6
        set dst 192.168.100.0 255.255.255.0
        set gateway 2.1.1.2
        set device "port3"
    next
end
