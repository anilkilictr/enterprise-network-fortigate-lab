!
! Optional redundant core/distribution sample - corrected lab addressing
! Purpose: VLAN, HSRP-style gateway, EtherChannel and OSPF example
!
hostname SW-CORE-01
no ip domain-lookup

vlan 10
 name IT
vlan 20
 name HR
vlan 30
 name SALES
vlan 40
 name ENGINEERING
vlan 100
 name SERVERS

interface Port-channel1
 description Uplink-to-SW-CORE-02
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,100

interface range GigabitEthernet0/1 - 2
 description EtherChannel-to-SW-CORE-02
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,100
 channel-group 1 mode active

interface Vlan10
 description IT Gateway
 ip address 10.1.1.2 255.255.255.0
 standby 10 ip 10.1.1.1
 standby 10 priority 110
 standby 10 preempt
 ip helper-address 192.168.100.10

interface Vlan20
 description HR Gateway
 ip address 20.1.1.2 255.255.255.0
 standby 20 ip 20.1.1.1
 standby 20 priority 110
 standby 20 preempt
 ip helper-address 192.168.100.10

interface Vlan30
 description Sales Gateway
 ip address 30.1.1.2 255.255.255.0
 standby 30 ip 30.1.1.1
 standby 30 priority 110
 standby 30 preempt
 ip helper-address 192.168.100.10

interface Vlan40
 description Engineering Gateway
 ip address 40.1.1.2 255.255.255.0
 standby 40 ip 40.1.1.1
 standby 40 priority 110
 standby 40 preempt
 ip helper-address 192.168.100.10

interface Vlan100
 description Server VLAN
 ip address 192.168.100.2 255.255.255.0
 standby 100 ip 192.168.100.1
 standby 100 priority 110
 standby 100 preempt

router ospf 10
 router-id 10.255.255.1
 network 10.1.1.0 0.0.0.255 area 0
 network 20.1.1.0 0.0.0.255 area 0
 network 30.1.1.0 0.0.0.255 area 0
 network 40.1.1.0 0.0.0.255 area 0
 network 192.168.100.0 0.0.0.255 area 0
 passive-interface default

end
