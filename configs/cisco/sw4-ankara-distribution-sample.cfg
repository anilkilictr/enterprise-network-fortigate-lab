! SW-4 Ankara Distribution - sample sanitized configuration
hostname SW4-ANKARA-DIST
ip routing
!
vlan 10
 name IT
vlan 20
 name HR
vlan 30
 name SALES
vlan 40
 name ENGINEERING
!
interface Ethernet0/1
 description Routed uplink to R1 Ankara
 no switchport
 ip address 13.1.1.2 255.255.255.0
 no shutdown
!
interface Ethernet1/0
 description Routed link to SW-3
 no switchport
 ip address 10.0.0.2 255.255.255.252
 no shutdown
!
interface Vlan30
 description Sales Gateway
 ip address 30.1.1.1 255.255.255.0
 ip helper-address 192.168.100.10
 no shutdown
!
interface Vlan40
 description Engineering Gateway
 ip address 40.1.1.1 255.255.255.0
 ip helper-address 192.168.100.10
 no shutdown
!
router ospf 10
 router-id 4.4.4.4
 network 10.0.0.0 0.0.0.3 area 0
 network 13.1.1.0 0.0.0.255 area 0
 network 30.1.1.0 0.0.0.255 area 0
 network 40.1.1.0 0.0.0.255 area 0
