!
! SW-HQ-CORE-02 - Sanitized Sample Configuration
!

hostname SW-HQ-CORE-02
no ip domain-lookup

vlan 10
 name IT
vlan 20
 name HR
vlan 30
 name SALES
vlan 40
 name SERVERS
vlan 99
 name MANAGEMENT

interface Port-channel1
 description Uplink-to-SW-HQ-CORE-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,99

interface range GigabitEthernet0/1 - 2
 description EtherChannel-to-SW-HQ-CORE-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,99
 channel-group 1 mode active

interface Vlan10
 description IT Gateway Backup
 ip address 10.10.10.3 255.255.255.0
 standby 10 ip 10.10.10.1
 standby 10 priority 100
 standby 10 preempt
 ip helper-address 10.10.40.10

interface Vlan20
 description HR Gateway Backup
 ip address 10.10.20.3 255.255.255.0
 standby 20 ip 10.10.20.1
 standby 20 priority 100
 standby 20 preempt
 ip helper-address 10.10.40.10

interface Vlan30
 description Sales Gateway Backup
 ip address 10.10.30.3 255.255.255.0
 standby 30 ip 10.10.30.1
 standby 30 priority 100
 standby 30 preempt
 ip helper-address 10.10.40.10

router ospf 10
 router-id 2.2.2.2
 network 10.10.10.0 0.0.0.255 area 0
 network 10.10.20.0 0.0.0.255 area 0
 network 10.10.30.0 0.0.0.255 area 0
 network 10.10.40.0 0.0.0.255 area 0
 passive-interface default
 no passive-interface Vlan40

end
