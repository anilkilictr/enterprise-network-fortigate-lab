!
! Istanbul Server Access Switch - Sanitized Sample Configuration
!
hostname SW-IST-SERVER-ACCESS
no ip domain-lookup

vlan 100
 name SERVERS

interface GigabitEthernet0/1
 description Uplink-to-Istanbul-Distribution
 switchport mode trunk
 switchport trunk allowed vlan 100

interface range GigabitEthernet0/2 - 10
 description Server-and-Test-Client-Ports
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast

end
