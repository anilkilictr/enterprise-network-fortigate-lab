! SW-14 Server Access - sample sanitized configuration
hostname SW14-SERVER-ACCESS
!
vlan 100
 name SERVERS
!
interface Ethernet1/0
 description Windows Server
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast
!
interface Ethernet1/1
 description Server Test VPC
 switchport mode access
 switchport access vlan 100
 spanning-tree portfast
!
interface range Ethernet0/0 - 3
 description Uplinks to Istanbul distribution switches
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 100
!
interface Vlan100
 description Management SVI / Server VLAN gateway if L3 enabled here
 ip address 192.168.100.1 255.255.255.0
 no shutdown
